<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickQR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      color: #1a1a2e;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      max-width: 480px;
      margin: 0 auto;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus { border-color: #4f46e5; }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .options label {
      font-size: 0.78rem;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }

    .options input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
    }

    .options input[type="color"] {
      width: 100%;
      height: 38px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      padding: 2px;
    }

    button.generate-btn {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.generate-btn:hover { background: #4338ca; }
    button.generate-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      text-align: center;
      display: none;
    }

    .result img {
      border-radius: 8px;
      border: 1px solid #eee;
      max-width: 100%;
    }

    .download-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 9px 20px;
      background: #f3f4f6;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .download-btn:hover { background: #e5e7eb; }

    .error {
      margin-top: 16px;
      color: #e74c3c;
      font-size: 0.88rem;
      text-align: center;
      display: none;
    }

    footer {
      text-align: center;
      margin-top: 48px;
      padding-bottom: 32px;
      font-size: 0.82rem;
      color: #bbb;
    }

    footer a {
      color: #4f46e5;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>QuickQR</h1>
  <p class="subtitle">Generate a QR code for any text or URL instantly.</p>

  <div class="card">
    <input id="text" type="text" placeholder="Enter text or URL..." />

    <div class="options">
      <div>
        <label>Size (px)</label>
        <input id="size" type="number" value="300" min="100" max="1000" />
      </div>
      <div>
        <label>Foreground</label>
        <input id="dark" type="color" value="#000000" />
      </div>
      <div>
        <label>Background</label>
        <input id="light" type="color" value="#ffffff" />
      </div>
    </div>

    <button class="generate-btn" id="btn" onclick="generate()">Generate QR Code</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <img id="qr-img" src="" alt="QR Code" />
      <br />
      <a class="download-btn" id="download-btn" download="qrcode.png">Download PNG</a>
    </div>
  </div>

  <footer>
    <p>Built by <a href="https://github.com/nakardarichards" target="_blank">Nakarda Richards</a></p>
  </footer>

  <script>
    async function generate() {
      const text = document.getElementById("text").value.trim();
      const size = document.getElementById("size").value;
      const dark = document.getElementById("dark").value;
      const light = document.getElementById("light").value;
      const btn = document.getElementById("btn");
      const error = document.getElementById("error");
      const result = document.getElementById("result");

      error.style.display = "none";
      result.style.display = "none";

      if (!text) {
        error.textContent = "Please enter some text or a URL.";
        error.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Generating...";

      try {
        const res = await fetch("/api/qr", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, size: parseInt(size), dark, light })
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || "Something went wrong");
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        document.getElementById("qr-img").src = url;
        document.getElementById("download-btn").href = url;
        result.style.display = "block";

      } catch (err) {
        error.textContent = err.message;
        error.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate QR Code";
      }
    }

    document.getElementById("text").addEventListener("keydown", e => {
      if (e.key === "Enter") generate();
    });
  </script>
</body>
</html>
